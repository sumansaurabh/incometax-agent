<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Login to e-Filing Portal</title>
  </head>
  <body>
    <form id="loginForm">
      <label for="userid">PAN / Aadhaar</label>
      <input id="userid" name="userid" autocomplete="username" />
      <label for="loginPassword">Password</label>
      <input id="loginPassword" type="password" name="password" />
      <label for="loginOtp">OTP</label>
      <input id="loginOtp" name="oneTimePassword" />
      <div>Captcha</div>
    </form>
  </body>
</html>
