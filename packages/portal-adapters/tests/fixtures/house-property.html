<!doctype html>
<html lang="en">
  <head>
    <title>Schedule HP | House Property</title>
  </head>
  <body>
    <section>
      <h1>Income from House Property</h1>
      <form>
        <label for="propertyType">Property Type</label>
        <select id="propertyType" name="property_type">
          <option>Self Occupied</option>
          <option>Let Out</option>
        </select>

        <label for="rentalIncome">Rental Income</label>
        <input id="rentalIncome" name="rental_income" />

        <label for="municipalTax">Municipal Taxes</label>
        <input id="municipalTax" name="municipal_taxes" />

        <label for="homeLoanInterest">Interest on Borrowed Capital</label>
        <input id="homeLoanInterest" name="home_loan_interest" />

        <label for="coOwnerDetails">Co-owner Details</label>
        <textarea id="coOwnerDetails" data-field="co_owner_details"></textarea>
      </form>
    </section>
  </body>
</html>
