<!doctype html>
<html lang="en">
  <head>
    <title>Tax Regime Choice</title>
  </head>
  <body>
    <section>
      <h1>Choose Tax Regime</h1>
      <p>Old regime or new regime under section 115BAC</p>
      <form>
        <label for="taxRegime">Tax Regime</label>
        <select id="taxRegime" name="tax_regime">
          <option value="old_regime">Old Regime</option>
          <option value="new_regime">New Regime</option>
        </select>
      </form>
    </section>
  </body>
</html>
