name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install JS deps
        run: pnpm install --no-frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Lint
        run: pnpm lint || true
      - name: Test
        run: pnpm test || true
