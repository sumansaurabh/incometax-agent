name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: itx
          POSTGRES_USER: itx
          POSTGRES_PASSWORD: itx
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U itx -d itx"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ITX_DATABASE_URL: postgresql://itx:itx@localhost:5432/itx
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install JS deps
        run: pnpm install --no-frozen-lockfile
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install fastapi pydantic opentelemetry-sdk opentelemetry-api opentelemetry-exporter-otlp-proto-http asyncpg redis
      - name: Build
        run: pnpm build
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
      - name: Compile Python
        run: python -m compileall apps/backend/src apps/workers/src packages/rules-core/src
      - name: Backend Agent Tests
        run: PYTHONPATH=apps/backend/src:apps/workers/src:packages/rules-core/src python -m unittest discover -s apps/backend/tests/agent -p 'test_*.py'
      - name: Backend API Tests
        run: PYTHONPATH=apps/backend/src:apps/workers/src:packages/rules-core/src python -m unittest discover -s apps/backend/tests/api -p 'test_*.py'
      - name: Workers Tests
        run: PYTHONPATH=apps/backend/src:apps/workers/src:packages/rules-core/src python -m unittest discover -s apps/workers/tests -p 'test_*.py'
      - name: Rules Unit Tests
        run: PYTHONPATH=apps/backend/src:apps/workers/src:packages/rules-core/src python -m unittest discover -s packages/rules-core/tests/cases -p 'test_*.py'
