version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: itx
      POSTGRES_USER: itx
      POSTGRES_PASSWORD: itx
    # ports:
    #   - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U itx -d itx']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # ports:
    #   - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.2
    # ports:
    #   - '6333:6333'
    #   - '6334:6334'
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'bash -lc ''exec 3<>/dev/tcp/127.0.0.1/6333 && printf "GET /readyz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 && grep -q "200 OK" <&3''',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: itxadmin
      MINIO_ROOT_PASSWORD: itxadmin123
    # ports:
    #   - '9000:9000'
    #   - '9001:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../
      dockerfile: infra/docker/backend.Dockerfile
    environment:
      ITX_DATABASE_URL: postgresql://itx:itx@postgres:5432/itx
      ITX_DOCUMENT_STORAGE_ROOT: /tmp/itx-documents
      ITX_DOCUMENT_STORAGE_BACKEND: ${ITX_DOCUMENT_STORAGE_BACKEND:-minio}
      ITX_REDIS_URL: ${ITX_REDIS_URL:-redis://redis:6379/0}
      ITX_QDRANT_URL: ${ITX_QDRANT_URL:-http://qdrant:6333}
      ITX_QDRANT_COLLECTION: ${ITX_QDRANT_COLLECTION:-tax_documents}
      ITX_MINIO_ENDPOINT: ${ITX_MINIO_ENDPOINT:-minio:9000}
      ITX_MINIO_ACCESS_KEY: ${ITX_MINIO_ACCESS_KEY:-itxadmin}
      ITX_MINIO_SECRET_KEY: ${ITX_MINIO_SECRET_KEY:-itxadmin123}
      ITX_MINIO_BUCKET: ${ITX_MINIO_BUCKET:-itx-documents}
      ITX_OPENAI_API_KEY: ${ITX_OPENAI_API_KEY:-}
      ITX_OPENAI_BASE_URL: ${ITX_OPENAI_BASE_URL:-https://api.openai.com/v1}
      ITX_EMBEDDING_MODEL: ${ITX_EMBEDDING_MODEL:-text-embedding-3-small}
      ITX_EMBEDDING_DIMENSIONS: ${ITX_EMBEDDING_DIMENSIONS:-1536}
      ITX_AI_PROVIDER: ${ITX_AI_PROVIDER:-}
      ITX_AI_MODEL: ${ITX_AI_MODEL:-}
      ITX_AI_API_KEY: ${ITX_AI_API_KEY:-}
      ITX_AI_BASE_URL: ${ITX_AI_BASE_URL:-}
      ITX_ANTHROPIC_API_KEY: ${ITX_ANTHROPIC_API_KEY:-}
      ITX_ANTHROPIC_BASE_URL: ${ITX_ANTHROPIC_BASE_URL:-}
      ITX_AGENT_MODEL: ${ITX_AGENT_MODEL:-claude-sonnet-4-6}
      ITX_AGENT_MODEL_DEEP: ${ITX_AGENT_MODEL_DEEP:-claude-opus-4-7}
      ITX_AGENT_MAX_STEPS: ${ITX_AGENT_MAX_STEPS:-6}
      ITX_AGENT_MAX_OUTPUT_TOKENS: ${ITX_AGENT_MAX_OUTPUT_TOKENS:-1024}
      ITX_AGENT_REQUEST_TIMEOUT_SECONDS: ${ITX_AGENT_REQUEST_TIMEOUT_SECONDS:-60}
      ITX_COHERE_API_KEY: ${ITX_COHERE_API_KEY:-}
      ITX_TAVILY_API_KEY: ${ITX_TAVILY_API_KEY:-}
      ITX_LANGFUSE_ENABLED: ${ITX_LANGFUSE_ENABLED:-false}
      ITX_LANGFUSE_PUBLIC_KEY: ${ITX_LANGFUSE_PUBLIC_KEY:-}
      ITX_LANGFUSE_SECRET_KEY: ${ITX_LANGFUSE_SECRET_KEY:-}
      ITX_LANGFUSE_OTLP_ENDPOINT: ${ITX_LANGFUSE_OTLP_ENDPOINT:-}
      ITX_OTEL_EXPORTER_OTLP_ENDPOINT: ${ITX_OTEL_EXPORTER_OTLP_ENDPOINT:-}
      ITX_OTEL_EXPORTER_OTLP_HEADERS: ${ITX_OTEL_EXPORTER_OTLP_HEADERS:-}
      ITX_ALLOWED_ORIGINS: ${ITX_ALLOWED_ORIGINS:-http://localhost:4173,http://localhost:5173}
      WATCHFILES_FORCE_POLLING: ${WATCHFILES_FORCE_POLLING:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../../apps/backend:/app/apps/backend
      - ../../apps/workers:/app/apps/workers
    ports:
      - '8000:8000'

  workers:
    build:
      context: ../../
      dockerfile: infra/docker/workers.Dockerfile
    environment:
      ITX_DATABASE_URL: postgresql://itx:itx@postgres:5432/itx
      ITX_DOCUMENT_STORAGE_ROOT: /tmp/itx-documents
      ITX_DOCUMENT_STORAGE_BACKEND: ${ITX_DOCUMENT_STORAGE_BACKEND:-minio}
      ITX_REDIS_URL: ${ITX_REDIS_URL:-redis://redis:6379/0}
      ITX_QDRANT_URL: ${ITX_QDRANT_URL:-http://qdrant:6333}
      ITX_QDRANT_COLLECTION: ${ITX_QDRANT_COLLECTION:-tax_documents}
      ITX_MINIO_ENDPOINT: ${ITX_MINIO_ENDPOINT:-minio:9000}
      ITX_MINIO_ACCESS_KEY: ${ITX_MINIO_ACCESS_KEY:-itxadmin}
      ITX_MINIO_SECRET_KEY: ${ITX_MINIO_SECRET_KEY:-itxadmin123}
      ITX_MINIO_BUCKET: ${ITX_MINIO_BUCKET:-itx-documents}
      ITX_OPENAI_API_KEY: ${ITX_OPENAI_API_KEY:-}
      ITX_OPENAI_BASE_URL: ${ITX_OPENAI_BASE_URL:-https://api.openai.com/v1}
      ITX_EMBEDDING_MODEL: ${ITX_EMBEDDING_MODEL:-text-embedding-3-small}
      ITX_EMBEDDING_DIMENSIONS: ${ITX_EMBEDDING_DIMENSIONS:-1536}
      ITX_AI_PROVIDER: ${ITX_AI_PROVIDER:-}
      ITX_AI_MODEL: ${ITX_AI_MODEL:-}
      ITX_AI_API_KEY: ${ITX_AI_API_KEY:-}
      ITX_AI_BASE_URL: ${ITX_AI_BASE_URL:-}
      ITX_ANTHROPIC_API_KEY: ${ITX_ANTHROPIC_API_KEY:-}
      ITX_ANTHROPIC_BASE_URL: ${ITX_ANTHROPIC_BASE_URL:-}
      ITX_AGENT_MODEL: ${ITX_AGENT_MODEL:-claude-sonnet-4-6}
      ITX_AGENT_MODEL_DEEP: ${ITX_AGENT_MODEL_DEEP:-claude-opus-4-7}
      ITX_AGENT_MAX_STEPS: ${ITX_AGENT_MAX_STEPS:-6}
      ITX_AGENT_MAX_OUTPUT_TOKENS: ${ITX_AGENT_MAX_OUTPUT_TOKENS:-1024}
      ITX_AGENT_REQUEST_TIMEOUT_SECONDS: ${ITX_AGENT_REQUEST_TIMEOUT_SECONDS:-60}
      ITX_COHERE_API_KEY: ${ITX_COHERE_API_KEY:-}
      ITX_TAVILY_API_KEY: ${ITX_TAVILY_API_KEY:-}
      ITX_LANGFUSE_ENABLED: ${ITX_LANGFUSE_ENABLED:-false}
      ITX_LANGFUSE_PUBLIC_KEY: ${ITX_LANGFUSE_PUBLIC_KEY:-}
      ITX_LANGFUSE_SECRET_KEY: ${ITX_LANGFUSE_SECRET_KEY:-}
      ITX_LANGFUSE_OTLP_ENDPOINT: ${ITX_LANGFUSE_OTLP_ENDPOINT:-}
      ITX_OTEL_EXPORTER_OTLP_ENDPOINT: ${ITX_OTEL_EXPORTER_OTLP_ENDPOINT:-}
      ITX_OTEL_EXPORTER_OTLP_HEADERS: ${ITX_OTEL_EXPORTER_OTLP_HEADERS:-}
      WATCHFILES_FORCE_POLLING: ${WATCHFILES_FORCE_POLLING:-true}
      ITX_WORKER_POLL_INTERVAL_SECONDS: ${ITX_WORKER_POLL_INTERVAL_SECONDS:-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../../apps/backend:/app/apps/backend
      - ../../apps/workers:/app/apps/workers

  web-dashboard:
    build:
      context: ../../
      dockerfile: infra/docker/web-dashboard.Dockerfile
    environment:
      VITE_ITX_BACKEND_BASE_URL: ${VITE_ITX_BACKEND_BASE_URL:-http://localhost:8000}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL:-500}
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ../../apps/web-dashboard:/app/apps/web-dashboard
    ports:
      - '4173:4173'

volumes:
  qdrant-data:
  minio-data:
