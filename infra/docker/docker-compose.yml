version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: itx
      POSTGRES_USER: itx
      POSTGRES_PASSWORD: itx
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U itx -d itx']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../
      dockerfile: infra/docker/backend.Dockerfile
    environment:
      ITX_DATABASE_URL: postgresql://itx:itx@postgres:5432/itx
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8000:8000'

  workers:
    build:
      context: ../../
      dockerfile: infra/docker/workers.Dockerfile
