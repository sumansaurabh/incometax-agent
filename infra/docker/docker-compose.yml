version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: itx
      POSTGRES_USER: itx
      POSTGRES_PASSWORD: itx
    # ports:
    #   - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U itx -d itx']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # ports:
    #   - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../
      dockerfile: infra/docker/backend.Dockerfile
    environment:
      ITX_DATABASE_URL: postgresql://itx:itx@postgres:5432/itx
      ITX_DOCUMENT_STORAGE_ROOT: /tmp/itx-documents
      ITX_REDIS_URL: ${ITX_REDIS_URL:-redis://redis:6379/0}
      ITX_AI_PROVIDER: ${ITX_AI_PROVIDER:-openai}
      ITX_AI_MODEL: ${ITX_AI_MODEL:-gpt-4.1-mini}
      ITX_AI_API_KEY: ${ITX_AI_API_KEY:-}
      ITX_AI_BASE_URL: ${ITX_AI_BASE_URL:-}
      ITX_LANGFUSE_ENABLED: ${ITX_LANGFUSE_ENABLED:-false}
      ITX_LANGFUSE_PUBLIC_KEY: ${ITX_LANGFUSE_PUBLIC_KEY:-}
      ITX_LANGFUSE_SECRET_KEY: ${ITX_LANGFUSE_SECRET_KEY:-}
      ITX_LANGFUSE_OTLP_ENDPOINT: ${ITX_LANGFUSE_OTLP_ENDPOINT:-}
      ITX_OTEL_EXPORTER_OTLP_ENDPOINT: ${ITX_OTEL_EXPORTER_OTLP_ENDPOINT:-}
      ITX_OTEL_EXPORTER_OTLP_HEADERS: ${ITX_OTEL_EXPORTER_OTLP_HEADERS:-}
      ITX_ALLOWED_ORIGINS: ${ITX_ALLOWED_ORIGINS:-http://localhost:4173,http://localhost:5173}
      WATCHFILES_FORCE_POLLING: ${WATCHFILES_FORCE_POLLING:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../apps/backend:/app/apps/backend
      - ../../apps/workers:/app/apps/workers
    ports:
      - '8000:8000'

  workers:
    build:
      context: ../../
      dockerfile: infra/docker/workers.Dockerfile
    environment:
      ITX_DATABASE_URL: postgresql://itx:itx@postgres:5432/itx
      ITX_DOCUMENT_STORAGE_ROOT: /tmp/itx-documents
      ITX_REDIS_URL: ${ITX_REDIS_URL:-redis://redis:6379/0}
      ITX_AI_PROVIDER: ${ITX_AI_PROVIDER:-openai}
      ITX_AI_MODEL: ${ITX_AI_MODEL:-gpt-4.1-mini}
      ITX_AI_API_KEY: ${ITX_AI_API_KEY:-}
      ITX_AI_BASE_URL: ${ITX_AI_BASE_URL:-}
      ITX_LANGFUSE_ENABLED: ${ITX_LANGFUSE_ENABLED:-false}
      ITX_LANGFUSE_PUBLIC_KEY: ${ITX_LANGFUSE_PUBLIC_KEY:-}
      ITX_LANGFUSE_SECRET_KEY: ${ITX_LANGFUSE_SECRET_KEY:-}
      ITX_LANGFUSE_OTLP_ENDPOINT: ${ITX_LANGFUSE_OTLP_ENDPOINT:-}
      ITX_OTEL_EXPORTER_OTLP_ENDPOINT: ${ITX_OTEL_EXPORTER_OTLP_ENDPOINT:-}
      ITX_OTEL_EXPORTER_OTLP_HEADERS: ${ITX_OTEL_EXPORTER_OTLP_HEADERS:-}
      WATCHFILES_FORCE_POLLING: ${WATCHFILES_FORCE_POLLING:-true}
      ITX_WORKER_POLL_INTERVAL_SECONDS: ${ITX_WORKER_POLL_INTERVAL_SECONDS:-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../apps/backend:/app/apps/backend
      - ../../apps/workers:/app/apps/workers

  web-dashboard:
    build:
      context: ../../
      dockerfile: infra/docker/web-dashboard.Dockerfile
    environment:
      VITE_ITX_BACKEND_BASE_URL: ${VITE_ITX_BACKEND_BASE_URL:-http://localhost:8000}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL:-500}
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ../../apps/web-dashboard:/app/apps/web-dashboard
    ports:
      - '4173:4173'
